<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient - deep twilight -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020B18"/>
      <stop offset="15%" stop-color="#071428"/>
      <stop offset="35%" stop-color="#0C1F3D"/>
      <stop offset="55%" stop-color="#142D52"/>
      <stop offset="72%" stop-color="#1B3A63"/>
      <stop offset="85%" stop-color="#2A4A72"/>
      <stop offset="92%" stop-color="#3D5A7A"/>
      <stop offset="100%" stop-color="#4A6580"/>
    </linearGradient>

    <!-- Horizon warm glow -->
    <radialGradient id="horizonGlow" cx="50%" cy="82%" rx="60%" ry="25%">
      <stop offset="0%" stop-color="#D4845A" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#B06840" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1B3A63" stop-opacity="0"/>
    </radialGradient>

    <!-- Moon glow -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8DDD0" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#C8BFAF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1B3A63" stop-opacity="0"/>
    </radialGradient>

    <!-- Water reflection gradient -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3555"/>
      <stop offset="30%" stop-color="#122842"/>
      <stop offset="100%" stop-color="#0A1A30"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Horizon warm glow -->
  <rect width="1920" height="1080" fill="url(#horizonGlow)"/>

  <!-- Stars -->
  <circle cx="150" cy="80" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="350" cy="140" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="520" cy="50" r="1" fill="white" opacity="0.6"/>
  <circle cx="680" cy="120" r="0.7" fill="white" opacity="0.25"/>
  <circle cx="900" cy="60" r="1.3" fill="white" opacity="0.4"/>
  <circle cx="1100" cy="100" r="0.9" fill="white" opacity="0.35"/>
  <circle cx="1250" cy="45" r="1.1" fill="white" opacity="0.5"/>
  <circle cx="1400" cy="130" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="1600" cy="70" r="1" fill="white" opacity="0.45"/>
  <circle cx="1780" cy="110" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="250" cy="200" r="0.6" fill="white" opacity="0.2"/>
  <circle cx="800" cy="180" r="0.8" fill="white" opacity="0.25"/>
  <circle cx="1500" cy="190" r="0.6" fill="white" opacity="0.2"/>

  <!-- Moon -->
  <circle cx="1550" cy="200" r="18" fill="url(#moonGlow)"/>
  <circle cx="1550" cy="200" r="8" fill="#E8DDD0" opacity="0.85"/>

  <!-- Far mountains - lightest -->
  <path d="M0 720 Q100 640 200 680 Q300 600 420 660 Q500 580 600 640 Q700 560 800 620 Q900 550 1000 610 Q1100 540 1200 600 Q1300 560 1400 620 Q1500 570 1600 630 Q1700 580 1800 640 Q1880 610 1920 650 L1920 780 L0 780Z" fill="#1E3D5E" opacity="0.6"/>

  <!-- Mid mountains -->
  <path d="M0 750 Q80 680 180 720 Q280 650 400 710 Q480 630 580 690 Q680 610 780 670 Q860 600 960 660 Q1060 590 1160 650 Q1240 600 1340 660 Q1440 620 1540 680 Q1640 640 1740 700 Q1840 660 1920 700 L1920 800 L0 800Z" fill="#132D4A" opacity="0.8"/>

  <!-- Near mountains - darkest -->
  <path d="M0 780 Q120 730 240 760 Q360 710 480 750 Q560 700 680 740 Q780 690 880 730 Q980 700 1080 740 Q1180 710 1280 750 Q1380 720 1480 760 Q1580 730 1680 770 Q1780 740 1920 770 L1920 820 L0 820Z" fill="#0B1E33" opacity="0.95"/>

  <!-- Water / lake reflection area -->
  <rect y="800" width="1920" height="280" fill="url(#water)"/>

  <!-- Subtle water ripple lines -->
  <line x1="200" y1="840" x2="600" y2="840" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="860" x2="1300" y2="860" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="880" x2="900" y2="880" stroke="white" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="1000" y1="900" x2="1600" y2="900" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="100" y1="920" x2="700" y2="920" stroke="white" stroke-opacity="0.015" stroke-width="1"/>

  <!-- Mountain reflection in water (faint) -->
  <path d="M0 820 Q120 830 240 825 Q360 835 480 828 Q560 838 680 830 Q780 840 880 832 Q980 838 1080 830 Q1180 836 1280 828 Q1380 834 1480 826 Q1580 832 1680 824 Q1780 830 1920 822 L1920 870 L0 870Z" fill="#1A3555" opacity="0.3"/>
</svg>
