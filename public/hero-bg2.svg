<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep space gradient -->
    <linearGradient id="sky2" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="20%" stop-color="#050A15"/>
      <stop offset="45%" stop-color="#0A1628"/>
      <stop offset="65%" stop-color="#0F2240"/>
      <stop offset="80%" stop-color="#183058"/>
      <stop offset="100%" stop-color="#1C3A6E"/>
    </linearGradient>

    <!-- Aurora glow left -->
    <radialGradient id="aurora1" cx="25%" cy="40%" rx="30%" ry="40%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#0088CC" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Aurora glow right -->
    <radialGradient id="aurora2" cx="75%" cy="35%" rx="25%" ry="35%">
      <stop offset="0%" stop-color="#4466FF" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#2244AA" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm horizon -->
    <radialGradient id="warmHorizon" cx="50%" cy="95%" rx="70%" ry="30%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#CC4422" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Base sky -->
  <rect width="1920" height="1080" fill="url(#sky2)"/>

  <!-- Aurora effects -->
  <rect width="1920" height="1080" fill="url(#aurora1)"/>
  <rect width="1920" height="1080" fill="url(#aurora2)"/>
  <rect width="1920" height="1080" fill="url(#warmHorizon)"/>

  <!-- Subtle grid overlay -->
  <rect width="1920" height="1080" fill="url(#gridPattern)"/>

  <!-- Stars - scattered across sky -->
  <circle cx="120" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="310" cy="130" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="480" cy="40" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="650" cy="90" r="0.6" fill="white" opacity="0.25"/>
  <circle cx="820" cy="55" r="1.4" fill="white" opacity="0.45"/>
  <circle cx="990" cy="120" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="1150" cy="35" r="1.1" fill="white" opacity="0.55"/>
  <circle cx="1320" cy="100" r="0.9" fill="white" opacity="0.35"/>
  <circle cx="1500" cy="65" r="1.3" fill="white" opacity="0.4"/>
  <circle cx="1700" cy="85" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="200" cy="220" r="0.5" fill="white" opacity="0.2"/>
  <circle cx="550" cy="190" r="0.7" fill="white" opacity="0.15"/>
  <circle cx="1050" cy="200" r="0.6" fill="white" opacity="0.2"/>
  <circle cx="1400" cy="170" r="0.5" fill="white" opacity="0.15"/>
  <circle cx="1800" cy="150" r="0.9" fill="white" opacity="0.25"/>

  <!-- Flowing aurora/nebula curves -->
  <path d="M0 350 Q200 280 500 320 Q800 360 1100 300 Q1400 240 1700 290 Q1850 310 1920 300" stroke="url(#aurora1)" stroke-width="120" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M0 420 Q300 370 600 400 Q900 430 1200 380 Q1500 330 1920 370" stroke="#0066AA" stroke-width="80" fill="none" opacity="0.04" stroke-linecap="round"/>

  <!-- Geometric accent lines -->
  <line x1="0" y1="850" x2="1920" y2="850" stroke="white" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="900" x2="1920" y2="900" stroke="white" stroke-opacity="0.02" stroke-width="0.5"/>

  <!-- Bottom fade to solid dark -->
  <rect y="800" width="1920" height="280" fill="url(#sky2)" opacity="0.5"/>
  <rect y="900" width="1920" height="180">
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="300" cy="500" r="2" fill="white" opacity="0.05">
    <animate attributeName="cy" values="500;480;500" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="400" r="1.5" fill="white" opacity="0.04">
    <animate attributeName="cy" values="400;370;400" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1300" cy="450" r="2" fill="white" opacity="0.05">
    <animate attributeName="cy" values="450;420;450" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1600" cy="350" r="1.5" fill="white" opacity="0.03">
    <animate attributeName="cy" values="350;330;350" dur="9s" repeatCount="indefinite"/>
  </circle>
</svg>
