<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>

    <!-- Glowing orbs -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#006BA6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00A3FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Mesh gradient simulation -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Large ambient orbs -->
  <ellipse cx="200" cy="300" rx="500" ry="400" fill="url(#orb1)"/>
  <ellipse cx="1600" cy="250" rx="450" ry="350" fill="url(#orb2)"/>
  <ellipse cx="900" cy="800" rx="600" ry="300" fill="url(#orb3)"/>
  <ellipse cx="1400" cy="700" rx="400" ry="300" fill="url(#orb1)" opacity="0.5"/>

  <!-- Curved mesh lines - flowing network -->
  <g stroke="white" fill="none" stroke-linecap="round">
    <!-- Primary curves -->
    <path d="M-100 400 Q300 200 700 350 Q1100 500 1500 300 Q1700 200 2020 350" stroke-opacity="0.04" stroke-width="1"/>
    <path d="M-100 500 Q400 350 800 450 Q1200 550 1600 400 Q1800 320 2020 420" stroke-opacity="0.035" stroke-width="0.8"/>
    <path d="M-100 600 Q200 450 600 550 Q1000 650 1400 500 Q1700 400 2020 500" stroke-opacity="0.03" stroke-width="0.8"/>
    <path d="M-100 300 Q350 150 750 280 Q1150 410 1550 250 Q1750 170 2020 280" stroke-opacity="0.03" stroke-width="0.6"/>
    <path d="M-100 700 Q300 580 700 650 Q1100 720 1500 600 Q1800 520 2020 600" stroke-opacity="0.025" stroke-width="0.6"/>

    <!-- Cross curves -->
    <path d="M300 0 Q350 300 500 540 Q650 780 700 1080" stroke-opacity="0.02" stroke-width="0.6"/>
    <path d="M800 0 Q750 280 850 540 Q950 800 900 1080" stroke-opacity="0.025" stroke-width="0.6"/>
    <path d="M1300 0 Q1250 250 1350 500 Q1450 750 1400 1080" stroke-opacity="0.02" stroke-width="0.6"/>
    <path d="M1700 0 Q1650 300 1600 540 Q1550 780 1600 1080" stroke-opacity="0.015" stroke-width="0.6"/>
  </g>

  <!-- Intersection nodes / dots -->
  <g fill="white" filter="url(#glow)">
    <circle cx="700" cy="350" r="2" opacity="0.15"/>
    <circle cx="500" cy="540" r="1.5" opacity="0.1"/>
    <circle cx="850" cy="450" r="2" opacity="0.12"/>
    <circle cx="1200" cy="380" r="1.8" opacity="0.1"/>
    <circle cx="1500" cy="300" r="2" opacity="0.13"/>
    <circle cx="1350" cy="500" r="1.5" opacity="0.08"/>
    <circle cx="400" cy="350" r="1.5" opacity="0.08"/>
    <circle cx="1000" cy="550" r="1.8" opacity="0.1"/>
    <circle cx="600" cy="650" r="1.5" opacity="0.07"/>
    <circle cx="1600" cy="400" r="1.5" opacity="0.09"/>
  </g>

  <!-- Thin connecting lines between nodes -->
  <g stroke="white" stroke-width="0.3" fill="none">
    <line x1="700" y1="350" x2="850" y2="450" stroke-opacity="0.06"/>
    <line x1="850" y1="450" x2="1200" y2="380" stroke-opacity="0.05"/>
    <line x1="1200" y1="380" x2="1500" y2="300" stroke-opacity="0.05"/>
    <line x1="500" y1="540" x2="700" y2="350" stroke-opacity="0.04"/>
    <line x1="850" y1="450" x2="1000" y2="550" stroke-opacity="0.04"/>
    <line x1="1000" y1="550" x2="1350" y2="500" stroke-opacity="0.04"/>
    <line x1="1350" y1="500" x2="1500" y2="300" stroke-opacity="0.05"/>
    <line x1="400" y1="350" x2="700" y2="350" stroke-opacity="0.03"/>
    <line x1="1500" y1="300" x2="1600" y2="400" stroke-opacity="0.04"/>
    <line x1="600" y1="650" x2="1000" y2="550" stroke-opacity="0.03"/>
  </g>

  <!-- Subtle bottom gradient fade -->
  <rect y="750" width="1920" height="330" fill="url(#bg)" opacity="0.4"/>

  <!-- Top edge subtle light streak -->
  <rect x="0" y="0" width="1920" height="1" fill="white" opacity="0.03"/>
</svg>
